<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toky Ramarozaka | Consultant - Teacher - Dev</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/18e6813d54.js" crossorigin="anonymous"></script>
    <script src="data/tokimahery.data.js"></script>
    <script src="scripts/blog.js" defer></script>
</head>

<body>
    <header>
        <nav class="navbar is-primary" aria-label="main navigation" role="navigation">
            <div class="navbar-brand"><img src="assets/logo.png" alt="Toky Ramarozaka" width="300px"></div>
            <div class="navbar-menu">
                <div class="navbar-center">
                    <a href="index.html" class="navbar-item has-text-weight-bold">HOME</a>
                    <a href="blog.html" class="navbar-item has-text-weight-bold">BLOG</a>
                    <a href="courses.html" class="navbar-item has-text-weight-bold">COURSES</a>
                    <a href="#testimonials" class="navbar-item has-text-weight-bold">TESTIMONIALS</a>
                    <a href="#research" class="navbar-item has-text-weight-bold">RESEARCH</a>
                </div>
            </div>
            <div class="navbar-end">
                <input type="input" id="search-bar" class="has-text-white" placeholder="Search anything...">
                <a href="" class="navbar-item"><i class="fa-solid fa-basket-shopping is-size-4"></i></a>
            </div>
        </nav>
    </header>
    <main>
        <section class="section hero-blog">
            <div class="container has-text-centered">
                <p class="is-uppercase has-text-weight-semibold has-text-grey section-header">
                    Writing
                </p>
                <h1 class="title is-1">
                    The <i class="has-text-danger">blog</i>
                </h1>
                <p class="subtitle is-5">
                    Thoughts on teaching, software engineering, languages, and
                    everything in between.
                </p>
            </div>
        </section>
        <section class="section" id="blog-posts">
            <div class="container">
                <div class="columns is-variable is-6">
                    <div class="column is-two-thirds">
                        <div id="blog-posts-list"></div>
                    </div>
                    <aside class="column">
                        <div class="box mb-5">
                            <p class="has-text-weight-semibold is-uppercase section-label has-text-grey mb-2"
                                id="newsletter">
                                Newsletter</p>
                            <p class="blog-card-meta mb-3">
                                Get new articles straight to your inbox. No spam, ever.
                            </p>
                            <form>
                                <div class="field">
                                    <input class="input" type="email" placeholder="your@email.com" required />
                                    <button class="button is-primary" type="submit">
                                        Subscribe
                                    </button>
                                </div>
                            </form>
                        </div>
                        <div id="blog-sidebar"></div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
