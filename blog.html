<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toky Ramarozaka | Consultant - Teacher - Dev</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/18e6813d54.js" crossorigin="anonymous"></script>
    <script src="data/tokimahery.data.js"></script>
    <script src="scripts/blog.js" defer></script>
</head>

<body>
    <header>
        <nav class="navbar is-primary is-fixed-top" aria-label="main navigation" role="navigation">
            <div class="navbar-brand">
                <img src="assets/logo.png" alt="Toky Ramarozaka" id="logo">
                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false"
                    data-target="main-navbar">
                    <span aria-hidden="true" class="has-background-white"></span>
                    <span aria-hidden="true" class="has-background-white"></span>
                    <span aria-hidden="true" class="has-background-white"></span>
                    <span aria-hidden="true" class="has-background-white"></span>
                </a>
            </div>
            <div class="navbar-menu" id="main-navbar">
                <div class="navbar-center">
                    <a href="index.html"
                        class="navbar-item has-text-weight-bold is-size-7-mobile is-size-6-tablet is-size-6-desktop is-size-5-widescreen">HOME</a>
                    <a href="blog.html"
                        class="navbar-item has-text-weight-bold is-size-7-mobile is-size-6-tablet is-size-6-desktop is-size-5-widescreen">BLOG</a>
                    <a href="courses.html"
                        class="navbar-item has-text-weight-bold is-size-7-mobile is-size-6-tablet is-size-6-desktop is-size-5-widescreen">COURSES</a>
                    <a href="#testimonials"
                        class="navbar-item has-text-weight-bold is-size-7-mobile is-size-6-tablet is-size-6-desktop is-size-5-widescreen">TESTIMONIALS</a>
                    <a href="#research"
                        class="navbar-item has-text-weight-bold is-size-7-mobile is-size-6-tablet is-size-6-desktop is-size-5-widescreen">RESEARCH</a>
                </div>
                <div class="navbar-end">
                    <div class="navbar-item">
                        <input type="input" id="search-bar" class="has-text-white" placeholder="Search anything...">
                    </div>
                    <a href="" class="navbar-item"><i class="fa-solid fa-basket-shopping is-size-4"></i></a>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="section is-flex is-align-items-center hero-blog">
            <div class="container has-text-centered is-vcentered">
                <p
                    class="is-uppercase has-text-weight-semibold has-text-grey section-header is-size-6-mobile is-size-6-tablet is-size-5-desktop">
                    Writing
                </p>
                <h1 class="title is-3-mobile is-2-tablet is-1-desktop is-1-widescreen">
                    The <i class="has-text-primary">blog</i>
                </h1>
                <p class="subtitle has-text-grey is-5-mobile is-4-tablet is-3-desktop">
                    Thoughts on teaching, software engineering, languages, and <br>
                    everything in between.
                </p>
            </div>
        </section>
        <section class="section" id="blog-posts">
            <div class="container">
                <div class="columns">
                    <div class="column is-two-thirds">
                        <div id="blog-posts-list"></div>
                    </div>
                    <aside class="column" id="blog-sidebar">
                        <div id="archives"></div>
                        <div id="newsletter">
                            <div class="box mb-5">
                                <p class="has-text-weight-semibold is-uppercase section-label has-text-grey mb-2 is-size-7-mobile is-size-7-tablet is-size-6-desktop"
                                    id="newsletter-text">
                                    Newsletter</p>
                                <p class="blog-card-meta mb-3 is-size-7-mobile is-size-6-tablet is-size-6-desktop">
                                    Get new articles straight to your inbox. No spam, ever.
                                </p>
                                <form class="field">
                                    <div class="mb-4">
                                        <input class="input" type="email" placeholder="your@email.com" required />
                                    </div>
                                    <button class="button is-primary is-fullwidth" type="submit">
                                        Subscribe
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div id="videos"></div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
