<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toky Ramarozaka | Consultant - Teacher - Dev</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/18e6813d54.js" crossorigin="anonymous"></script>
    <script src="scripts/data/tokimahery.data.js"></script>
    <script src="scripts/cart.js" defer></script>
    <script src="scripts/navbar.js" defer></script>
</head>

<body>
    <header>
        <nav class="navbar is-primary is-fixed-top" aria-label="main navigation" role="navigation" id="navbar">
            <div class="navbar-brand is-flex is-justify-content-space-between is-align-items-center">
                <img src="assets/logo.png" alt="Toky Ramarozaka" id="logo">
                <span class="is-flex is-justify-content-end">
                    <span class="navbar-item is-display-none-desktop ">
                        <span class="p-0"><i class="fa-solid fa-basket-shopping is-size-4"></i></span>
                    </span>
                    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false"
                        data-target="main-navbar">
                        <span aria-hidden="true" class="has-background-white"></span>
                        <span aria-hidden="true" class="has-background-white"></span>
                        <span aria-hidden="true" class="has-background-white"></span>
                        <span aria-hidden="true" class="has-background-white"></span>
                    </a>
                </span>
            </div>
            <div class="navbar-menu" id="main-navbar">
                <div class="navbar-center">
                    <a href="index.html"
                        class="navbar-item has-text-weight-bold is-size-5-fullhd is-size-6-desktop is-size-6-widescreen is-size-7-touch">HOME</a>
                    <a href="blog.html"
                        class="navbar-item has-text-weight-bold is-size-5-fullhd is-size-6-desktop is-size-6-widescreen is-size-7-touch">BLOG</a>
                    <a href="courses.html"
                        class="navbar-item has-text-weight-bold is-size-5-fullhd is-size-6-desktop is-size-6-widescreen is-size-7-touch">COURSES</a>
                    <a href="testimonials.html"
                        class="navbar-item has-text-weight-bold is-size-5-fullhd is-size-6-desktop is-size-6-widescreen is-size-7-touch">TESTIMONIALS</a>
                    <a href="research.html"
                        class="navbar-item has-text-weight-bold is-size-5-fullhd is-size-6-desktop is-size-6-widescreen is-size-7-touch">RESEARCH</a>
                </div>
                <div class="navbar-end">
                    <div class="navbar-item">
                        <input type="text" id="search-bar" class="has-text-white is-size-5-fullhd"
                            placeholder="Search anything...">
                        <span class="navbar-item is-display-none-touch">
                            <span class="p-0"><i class="fa-solid fa-basket-shopping is-size-4"></i>
                            </span>
                        </span>
                    </div>
                </div>
        </nav>
    </header>
    <main>

        <main>
            <section id="contact-hero" class="hero is-medium custom-hero-bg has-background-white-ter">
                <div class="hero-body has-text-centered">
                    <div class="container">

                        <div class="contact-label is-flex is-justify-content-center is-align-items-center mb-5">
                            <span class="line line-left mr-3"></span>
                            <span class="has-text-weight-semibold is-size-7">GET IN TOUCH</span>
                            <span class="line line-right ml-3"></span>
                        </div>

                        <h1 class="title is-size-1-desktop is-size-1-fullhd is-size-1-widescreen is-size-2-touch p-5">
                            Contact <i class="has-text-primary">me</i>
                        </h1>

                    </div>
                </div>
            </section>

            <section class="section section-page-body">
                <div class="container">
                    <div class="columns is-variable is-8">

                        <div class="column is-7">
                            <h2 class="title is-2 section-main-title">Get In Touch</h2>

                            <form class="mt-6">
                                <div class="field">
                                    <label class="label">Name</label>
                                    <div class="control">
                                        <input class="input custom-input" type="text" placeholder="Your Name">
                                    </div>
                                </div>

                                <div class="field">
                                    <label class="label">Email</label>
                                    <div class="control">
                                        <input class="input custom-input" type="email"
                                            placeholder="example@yourmail.com">
                                    </div>
                                </div>

                                <div class="field">
                                    <label class="label">Subject</label>
                                    <div class="control">
                                        <input class="input custom-input" type="text" placeholder="Title">
                                    </div>
                                </div>

                                <div class="field">
                                    <label class="label">Message</label>
                                    <div class="control">
                                        <textarea class="textarea custom-input" placeholder="Type Here..."></textarea>
                                    </div>
                                </div>

                                <div class="control mt-5">
                                    <button type="submit" class="button is-primary is-fullwidth has-text-white">Send
                                        Now</button>
                                </div>
                            </form>
                        </div>

                        <div class="column is-5">
                            <div class="info-card has-text-centered">
                                <span class="icon is-large icon-bordeaux">
                                    <i class="fas fa-phone-alt fa-2x"></i>
                                </span>
                                <h4 class="title is-5 mt-4">Phone Number</h4>
                                <p class="has-text-grey">207-8767-452</p>
                            </div>

                            <div class="info-card has-text-centered">
                                <span class="icon is-large icon-bordeaux">
                                    <i class="fas fa-envelope fa-2x"></i>
                                </span>
                                <h4 class="title is-5 mt-4">Email Address</h4>
                                <p class="has-text-grey">tokyramarozaka@gmail.com</p>
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </main>
    </main>
    <footer class="footer has-background-link is-flex is-flex-direction-column is-align-items-center">
        <div class="container has-text-centered">
            <p class="title has-text-white py-3 is-1">Still hesitating?</p>
            <p class="has-text-white mt-5 mb-6 is-4">The majority of people I have collaborated with are showing
                positive reviews that<br>
                might help you make a choice.</p>
        </div>
        <a href="testimonials.html" class="button is-white has-text-primary is-rounded is-fullwidth-touch">SEE WHAT THEY
            SAY</a>
    </footer>
</body>

</html>
